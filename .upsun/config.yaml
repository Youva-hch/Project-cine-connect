applications:
  frontend:
    source:
      root: "/"
    type: "nodejs:20"
    build:
      flavor: none
    dependencies:
      nodejs:
        pnpm: "*"
    hooks:
      build: |
        set -euxo pipefail
        echo "[frontend] pnpm install start"
        pnpm install --frozen-lockfile --reporter=append-only --loglevel=info
        echo "[frontend] build start"
        pnpm --filter frontend build
        echo "[frontend] build done"
    web:
      locations:
        "/":
          root: "apps/frontend/dist"
          index:
            - "index.html"
          allow: true
          rules:
            ^/.*$:
              passthru: "/index.html"

  backend:
    source:
      root: "/"
    type: "nodejs:20"
    build:
      flavor: none
    dependencies:
      nodejs:
        pnpm: "*"
    hooks:
      build: |
        set -euxo pipefail
        echo "[backend] pnpm install start"
        pnpm install --frozen-lockfile --reporter=append-only --loglevel=info
        echo "[backend] build start"
        pnpm --filter backend build
        echo "[backend] build done"
      deploy: |
        set -euxo pipefail
        echo "[backend] migrations start"
        pnpm db:migrate
        echo "[backend] migrations done"
    web:
      commands:
        start: "node apps/backend/dist/index.js"
      locations:
        "/":
          passthru: true
    relationships:
      database: "postgres:postgresql"

services:
  postgres:
    type: postgresql:15

routes:
  "https://www.{default}/":
    type: upstream
    upstream: "frontend:http"
  "https://www.{default}/api/":
    type: upstream
    upstream: "backend:http"
  "https://{default}/":
    type: redirect
    to: "https://www.{default}/"

